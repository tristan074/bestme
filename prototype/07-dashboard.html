<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BestMe — 我的数据</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    .tex-dirt { background-color: #8B6E4E; background-image: radial-gradient(circle at 10% 20%, #7A5E3E 1px, transparent 1px), radial-gradient(circle at 30% 60%, #6B4F30 1px, transparent 1px), radial-gradient(circle at 50% 30%, #9B7E5E 1px, transparent 1px), radial-gradient(circle at 70% 80%, #7A5E3E 1px, transparent 1px), radial-gradient(circle at 90% 40%, #6B4F30 1px, transparent 1px), radial-gradient(circle at 20% 90%, #9B7E5E 1px, transparent 1px), radial-gradient(circle at 60% 10%, #7A5E3E 1px, transparent 1px), radial-gradient(circle at 80% 50%, #6B4F30 1px, transparent 1px); background-size: 32px 32px; }
    .tex-stone { background-color: #7F7F7F; background-image: radial-gradient(circle at 15% 25%, #6B6B6B 2px, transparent 2px), radial-gradient(circle at 45% 65%, #8F8F8F 2px, transparent 2px), radial-gradient(circle at 75% 35%, #6B6B6B 1.5px, transparent 1.5px), radial-gradient(circle at 25% 85%, #8F8F8F 1px, transparent 1px), radial-gradient(circle at 85% 15%, #6B6B6B 2px, transparent 2px), radial-gradient(circle at 55% 45%, #737373 1.5px, transparent 1.5px); background-size: 48px 48px; }
    .tex-deepslate { background-color: #4A4A4A; background-image: repeating-linear-gradient(0deg, transparent, transparent 4px, rgba(0,0,0,0.08) 4px, rgba(0,0,0,0.08) 8px), repeating-linear-gradient(90deg, transparent, transparent 4px, rgba(255,255,255,0.03) 4px, rgba(255,255,255,0.03) 8px); }
    .tex-planks { background-color: #BC9862; background-image: repeating-linear-gradient(90deg, transparent, transparent 30px, rgba(0,0,0,0.1) 30px, rgba(0,0,0,0.1) 32px), repeating-linear-gradient(0deg, transparent, transparent 6px, rgba(0,0,0,0.05) 6px, rgba(0,0,0,0.05) 8px); }
    .tex-obsidian { background-color: #1B1029; background-image: radial-gradient(circle at 20% 30%, #2A1A3A 3px, transparent 3px), radial-gradient(circle at 60% 70%, #1E1230 2px, transparent 2px), radial-gradient(circle at 80% 20%, #3A2050 2px, transparent 2px), radial-gradient(circle at 40% 90%, #2A1A3A 1.5px, transparent 1.5px); background-size: 40px 40px; }
    .mc-icon { display: inline-block; image-rendering: pixelated; image-rendering: -moz-crisp-edges; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, Helvetica, sans-serif; color: #FFFFFF; min-height: 100vh; }
    .pixel-font { font-family: 'Press Start 2P', monospace; text-shadow: 2px 2px 0 rgba(0,0,0,0.5); }
    .mc-btn { font-family: 'Press Start 2P', monospace; font-size: 14px; color: #FFFFFF; text-shadow: 2px 2px 0 #3F3F3F; padding: 14px 32px; border: 3px solid; border-color: #9A9A9A #5A5A5A #4A4A4A #8A8A8A; background: linear-gradient(to bottom, #7A7A7A 0%, #5A5A5A 40%, #4A4A4A 60%, #3A3A3A 100%); cursor: pointer; transition: all 0.05s; position: relative; }
    .mc-btn:hover { background: linear-gradient(to bottom, #7777BB 0%, #5555AA 40%, #4444AA 60%, #3333AA 100%); border-color: #9999DD #5555AA #4444AA #8888CC; text-shadow: 2px 2px 0 #28285E; }
    .mc-btn:active { transform: scale(0.97); }
    .mc-btn-green { background: linear-gradient(to bottom, #6B9B3A 0%, #5B8731 40%, #4A7028 60%, #3A5A1E 100%); border-color: #8BBB5A #4A7028 #3A5A1E #6B9B3A; }
    .mc-btn-green:hover { background: linear-gradient(to bottom, #7BAB4A 0%, #6B9B3A 40%, #5A8A30 60%, #4A7028 100%); }
    .mc-btn-gold { background: linear-gradient(to bottom, #FFD700 0%, #DAA520 40%, #B8860B 60%, #996600 100%); border-color: #FFE44D #B8860B #996600 #DAA520; color: #3A2A00; text-shadow: 1px 1px 0 rgba(255,255,255,0.3); }
    .mc-panel { background: #C6C6C6; border: 4px solid; border-color: #FFFFFF #555555 #555555 #FFFFFF; box-shadow: inset 0 0 0 2px #8B8B8B; color: #3F3F3F; padding: 16px; }
    .mc-panel-dark { background: #313131; border: 4px solid; border-color: #555555 #1A1A1A #1A1A1A #555555; box-shadow: inset 0 0 0 1px #252525; color: #FFFFFF; padding: 16px; }
    .mc-slot { background: #8B8B8B; border: 2px solid; border-color: #555555 #FFFFFF #FFFFFF #555555; display: flex; align-items: center; justify-content: center; width: 64px; height: 64px; }
    .mc-slot-dark { background: #1E1E1E; border: 2px solid; border-color: #0A0A0A #3A3A3A #3A3A3A #0A0A0A; }
    .mc-xp-track { background: #222; border: 2px solid #000; height: 10px; position: relative; }
    .mc-xp-fill { height: 100%; background: linear-gradient(to bottom, #80FF20, #4CAF00); box-shadow: 0 0 6px rgba(128, 255, 32, 0.5); transition: width 0.3s; }
    .mc-xp-label { position: absolute; top: -22px; left: 50%; transform: translateX(-50%); font-family: 'Press Start 2P', monospace; font-size: 10px; color: #80FF20; text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000; }
    .mc-heart { display: inline-block; width: 18px; height: 18px; background: #AA0000; clip-path: polygon(50% 85%, 15% 50%, 0% 30%, 0% 15%, 15% 0%, 35% 0%, 50% 15%, 65% 0%, 85% 0%, 100% 15%, 100% 30%, 85% 50%); position: relative; }
    .mc-heart::after { content: ''; position: absolute; top: 2px; left: 3px; width: 6px; height: 6px; background: #FF5555; clip-path: polygon(0 0, 100% 0, 100% 50%, 0 100%); }
    .mc-heart-empty { background: #3A0000; }
    .mc-heart-empty::after { display: none; }
    .mc-toast { background: #21002B; border: 3px solid; border-color: #6B2FA0 #3A1060 #3A1060 #6B2FA0; padding: 12px 16px; display: flex; align-items: center; gap: 14px; }
    .mc-toast-icon { width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; font-size: 28px; background: #8B8B8B; border: 2px solid; border-color: #555555 #FFFFFF #FFFFFF #555555; flex-shrink: 0; }
    .mc-toast-text { font-family: 'Press Start 2P', monospace; }
    .mc-toast-title { color: #FFFF00; font-size: 10px; text-shadow: 1px 1px 0 #000; margin-bottom: 6px; }
    .mc-toast-desc { color: #FFFFFF; font-size: 9px; text-shadow: 1px 1px 0 #000; }
    .mc-hotbar { background: #8B8B8B; border: 4px solid; border-color: #C6C6C6 #373737 #373737 #C6C6C6; display: flex; gap: 4px; padding: 4px; }
    .mc-hotbar-slot { width: 60px; height: 60px; background: #8B8B8B; border: 2px solid; border-color: #555555 #FFFFFF #FFFFFF #555555; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; cursor: pointer; transition: all 0.1s; }
    .mc-hotbar-slot:hover, .mc-hotbar-slot.active { background: #AAAACC; border-color: #7777AA #DDDDFF #DDDDFF #7777AA; }
    .mc-hotbar-slot .icon { font-size: 22px; }
    .mc-hotbar-slot .label { font-family: 'Press Start 2P', monospace; font-size: 6px; color: #FFFFFF; text-shadow: 1px 1px 0 #000; }
    .mc-hotbar-slot.active { outline: 2px solid #FFFFFF; outline-offset: -1px; }
    .mc-numpad { display: grid; grid-template-columns: repeat(3, 72px); gap: 6px; }
    .mc-numkey { height: 60px; font-family: 'Press Start 2P', monospace; font-size: 18px; color: #FFFFFF; text-shadow: 2px 2px 0 #3F3F3F; background: linear-gradient(to bottom, #7A7A7A 0%, #5A5A5A 40%, #4A4A4A 60%, #3A3A3A 100%); border: 3px solid; border-color: #9A9A9A #5A5A5A #4A4A4A #8A8A8A; cursor: pointer; }
    .mc-numkey:hover { background: linear-gradient(to bottom, #7777BB 0%, #5555AA 40%, #4444AA 60%, #3333AA 100%); border-color: #9999DD #5555AA #4444AA #8888CC; }
    .mc-numkey-ok { background: linear-gradient(to bottom, #6B9B3A 0%, #5B8731 40%, #4A7028 60%, #3A5A1E 100%) !important; border-color: #8BBB5A #4A7028 #3A5A1E #6B9B3A !important; }
    .mc-numkey-del { background: linear-gradient(to bottom, #CC4444 0%, #AA3333 40%, #882222 60%, #661111 100%) !important; border-color: #EE6666 #882222 #661111 #CC4444 !important; }
    .page { min-height: 100vh; padding: 24px; padding-bottom: 100px; }
    .container { max-width: 480px; margin: 0 auto; }
    .section-title { font-family: 'Press Start 2P', monospace; font-size: 10px; color: #AAAAAA; text-shadow: 1px 1px 0 #000; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 2px solid #555; }
    .grass-top { position: relative; }
    .grass-top::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 8px; background: linear-gradient(to bottom, #5B8731, #4A7028); border-bottom: 2px solid #3A5A1E; }
    .nav-wrapper { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 100; }
  </style>
</head>
<body>

  <div class="page tex-deepslate" id="page-dashboard">
    <div class="container">

      <h1 class="pixel-font" style="font-size:18px;text-align:center;color:#FFD700;margin-bottom:24px;">
        🗺️ 我的数据
      </h1>

      <!-- Stats row -->
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px;">
        <div class="mc-panel-dark" style="text-align:center;padding:12px;">
          <div class="pixel-font" style="font-size:16px;color:#80FF20;">1,280</div>
          <div style="font-size:10px;color:#AAAAAA;margin-top:4px;">总经验</div>
        </div>
        <div class="mc-panel-dark" style="text-align:center;padding:12px;">
          <div class="pixel-font" style="font-size:16px;color:#FF6600;">12</div>
          <div style="font-size:10px;color:#AAAAAA;margin-top:4px;">连续打卡</div>
        </div>
        <div class="mc-panel-dark" style="text-align:center;padding:12px;">
          <div class="pixel-font" style="font-size:16px;color:#5B8731;">86</div>
          <div style="font-size:10px;color:#AAAAAA;margin-top:4px;">已掌握字</div>
        </div>
      </div>

      <!-- Hearts as accuracy visualization -->
      <div class="section-title">小九九 正确率</div>
      <div class="mc-panel-dark" style="margin-bottom:20px;">
        <div style="display:flex;gap:4px;margin-bottom:8px;">
          <div class="mc-heart"></div>
          <div class="mc-heart"></div>
          <div class="mc-heart"></div>
          <div class="mc-heart"></div>
          <div class="mc-heart"></div>
          <div class="mc-heart"></div>
          <div class="mc-heart"></div>
          <div class="mc-heart"></div>
          <div class="mc-heart"></div>
          <div class="mc-heart mc-heart-empty"></div>
        </div>
        <div class="pixel-font" style="font-size:10px;color:#AAAAAA;">90% — 最佳: 0:52</div>
      </div>

      <!-- Chinese progress -->
      <div class="section-title">语文进度</div>
      <div class="mc-panel-dark" style="margin-bottom:20px;">
        <div style="margin-bottom:12px;">
          <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;">
            <span style="color:#5B8731;">已掌握</span><span style="color:#AAAAAA;">86/200</span>
          </div>
          <div class="mc-xp-track"><div class="mc-xp-fill" style="width:43%;"></div></div>
        </div>
        <div style="margin-bottom:12px;">
          <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;">
            <span style="color:#FFD700;">学习中</span><span style="color:#AAAAAA;">34/200</span>
          </div>
          <div class="mc-xp-track"><div class="mc-xp-fill" style="width:17%;background:linear-gradient(to bottom,#FFD700,#DAA520);box-shadow:0 0 6px rgba(255,215,0,0.4);"></div></div>
        </div>
      </div>

      <!-- Achievement wall -->
      <div class="section-title">成就墙</div>
      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:20px;">
        <div class="mc-toast" style="padding:10px;">
          <div class="mc-toast-icon" style="width:36px;height:36px;font-size:20px;">⚡</div>
          <div class="mc-toast-text">
            <div class="mc-toast-title" style="font-size:8px;">闪电口算</div>
            <div class="mc-toast-desc" style="font-size:7px;">1分钟完成</div>
          </div>
        </div>
        <div class="mc-toast" style="padding:10px;">
          <div class="mc-toast-icon" style="width:36px;height:36px;font-size:20px;">⭐</div>
          <div class="mc-toast-text">
            <div class="mc-toast-title" style="font-size:8px;">坚持之星</div>
            <div class="mc-toast-desc" style="font-size:7px;">连续7天</div>
          </div>
        </div>
        <div class="mc-toast" style="padding:10px;opacity:0.35;filter:grayscale(1);">
          <div class="mc-toast-icon" style="width:36px;height:36px;font-size:20px;">📚</div>
          <div class="mc-toast-text">
            <div class="mc-toast-title" style="font-size:8px;">百字英雄</div>
            <div class="mc-toast-desc" style="font-size:7px;">掌握100字</div>
          </div>
        </div>
        <div class="mc-toast" style="padding:10px;opacity:0.35;filter:grayscale(1);">
          <div class="mc-toast-icon" style="width:36px;height:36px;font-size:20px;">🌟</div>
          <div class="mc-toast-text">
            <div class="mc-toast-title" style="font-size:8px;">坚持之星·月</div>
            <div class="mc-toast-desc" style="font-size:7px;">连续30天</div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Bottom hotbar navigation -->
  <div class="nav-wrapper">
    <div class="mc-hotbar">
      <div class="mc-hotbar-slot">
        <span class="icon">🏠</span>
        <span class="label">首页</span>
      </div>
      <div class="mc-hotbar-slot">
        <span class="icon">⛏️</span>
        <span class="label">数学</span>
      </div>
      <div class="mc-hotbar-slot">
        <span class="icon">📖</span>
        <span class="label">语文</span>
      </div>
      <div class="mc-hotbar-slot active">
        <span class="icon">🗺️</span>
        <span class="label">数据</span>
      </div>
      <div class="mc-hotbar-slot">
        <span class="icon">⚔️</span>
        <span class="label">练习</span>
      </div>
      <div class="mc-hotbar-slot">
        <span class="icon">🏆</span>
        <span class="label">结果</span>
      </div>
      <div class="mc-hotbar-slot">
        <span class="icon">✏️</span>
        <span class="label">批改</span>
      </div>
    </div>
  </div>

</body>
</html>
